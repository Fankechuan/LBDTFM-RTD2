__include__: [
  ../runtime.yml,
  ./include/dataloader.yml,
  ./include/optimizer.yml,
  ./include/rtdetrv2_r50vd.yml
]

output_dir: ./output/rtdetrv2_r18vd_ir_new_120e_coco

PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: True

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5

RTDETRTransformerv2:
  num_layers: 3

epoches: 20

dataset:
  num_classes: 1

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:/pythoncache/dual_modal_insulator_fault_detection/rtdetrv2_pytorch/dataset/infrared/images/train
    ann_file: D:/pythoncache/dual_modal_insulator_fault_detection/rtdetrv2_pytorch/dataset/infrared/coco_json/infrared_train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: RandomPhotometricDistort
          p: 0.5
        - type: RandomZoomOut
          fill: 0
        - type: RandomIoUCrop
          p: 0.8
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: RandomHorizontalFlip
        - type: Resize
          size: [640, 640]
        - type: SanitizeBoundingBoxes
          min_size: 1
        - type: ConvertPILImage
          dtype: float32
          scale: True
        - type: ConvertBoxes
          fmt: cxcywh
          normalize: True
      policy:
        name: stop_epoch
        epoch: 117
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFuncion
    scales: null
    stop_epoch: 71
  total_batch_size: 16

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: D:/pythoncache/dual_modal_insulator_fault_detection/rtdetrv2_pytorch/dataset/infrared/images/val
    ann_file: D:/pythoncache/dual_modal_insulator_fault_detection/rtdetrv2_pytorch/dataset/infrared/coco_json/infrared_val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - type: Resize
          size: [640, 640]
        - type: ConvertPILImage
          dtype: float32
          scale: True
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFuncion
  total_batch_size: 32

optimizer:
  type: AdamW
  lr: 0.0003
#  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  params:
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

lr_scheduler:
  type: MultiStepLR
  milestones: [1000]
  gamma: 0.1

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 2000

use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 2000

criterion: RTDETRCriterionv2
RTDETRCriterionv2:
  weight_dict:
    loss_vfl: 2
    loss_bbox: 4       # ⭐ 提高框位置损失权重
    loss_giou: 2        # ⭐ 减小 GIoU 权重，避免过度关注框形状
  losses: [vfl, boxes]
  alpha: 0.75
  gamma: 2.0
  matcher:
    type: HungarianMatcher
    weight_dict:
      cost_class: 2
      cost_bbox: 5      # 匹配时同样提高 bbox 权重
      cost_giou: 2
    alpha: 0.25
    gamma: 2.0

